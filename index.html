  <!-- Lightbox Modal -->
  <div id="lightbox" class="lightbox">
    <span class="close">&times;</span>
    <button class="prev" id="prev-btn">&#10094;</button>
    <img class="lightbox-content" id="lightbox-img">
    <button class="next" id="next-btn">&#10095;</button>
  </div>



  <script>
    (function () {
      const grid = document.getElementById('photos-grid');
      const bar = document.getElementById('group-buttons');
      if (!grid || !bar) return;

      const imgs = Array.from(grid.querySelectorAll('img'));
      const groups = new Map();
      imgs.forEach(img => {
        const g = img.dataset.group || 'Ungrouped';
        if (!groups.has(g)) groups.set(g, []);
        groups.get(g).push(img);
      });

      const order = ['All', 'Birthday', '40-Day (Postpartum)', 'Portrait', 'Sawiro Uur'];

      function showGroup(name) {
        imgs.forEach(i => i.style.display = (name === 'All' || (i.dataset.group || 'Ungrouped') === name) ? '' : 'none');
        Array.from(bar.children).forEach(b => b.classList.toggle('active', b.datasetGroup === name));
      }

      // Add buttons in order if group exists
      order.forEach(name => {
        if (name === 'All' || groups.has(name)) {
          const btn = document.createElement('button');
          btn.textContent = name;
          btn.datasetGroup = name;
          btn.addEventListener('click', () => showGroup(name));
          if (name === 'All') btn.classList.add('active');
          bar.appendChild(btn);
        }
      });

      // Add any extra groups not in 'order'
      for (const name of groups.keys()) {
        if (order.includes(name)) continue;
        const btn = document.createElement('button');
        btn.textContent = name;
        btn.datasetGroup = name;
        btn.addEventListener('click', () => showGroup(name));
        bar.appendChild(btn);
      }

      // Click image: use existing openLightbox(src,alt) if present, else open new tab
      grid.addEventListener('click', e => {
        const img = e.target.closest('img');
        if (!img) return;
        if (typeof openLightbox === 'function') openLightbox(img.src, img.alt);
        
      });

      showGroup('All');
    })();

    (function () {
      const grid = document.getElementById('photos-grid');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');
      const closeBtn = document.querySelector('.close');
      const prevBtn = document.getElementById('prev-btn');
      const nextBtn = document.getElementById('next-btn');

      let currentImgs = []; // Sawirada hadda muuqda
      let currentIndex = 0;

      // Marka sawir la gujiyo
      grid.addEventListener('click', e => {
        const img = e.target.closest('img');
        if (!img) return;

        // Kaliya soo qabo sawirada hadda "muuqda" (ee aan la qarin)
        currentImgs = Array.from(grid.querySelectorAll('img')).filter(i => i.style.display !== 'none');
        currentIndex = currentImgs.indexOf(img);

        showLightbox(img.src);
      });

      function showLightbox(src) {
        lightboxImg.src = src;
        lightbox.style.display = 'flex';
      }

      // Fallaarta Midig
      nextBtn.addEventListener('click', () => {
        currentIndex = (currentIndex + 1) % currentImgs.length;
        lightboxImg.src = currentImgs[currentIndex].src;
      });

      // Fallaarta Bidix
      prevBtn.addEventListener('click', () => {
        currentIndex = (currentIndex - 1 + currentImgs.length) % currentImgs.length;
        lightboxImg.src = currentImgs[currentIndex].src;
      });

      // Ka bax (Close)
      closeBtn.addEventListener('click', () => {
        lightbox.style.display = 'none';
      });

      // Haddii meel madhan la gujiyo ka bax
      lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) lightbox.style.display = 'none';
      });

      // Isticmaalka Keyboard-ka (Bidix iyo Midig)
      document.addEventListener('keydown', (e) => {
        if (lightbox.style.display === 'flex') {
          if (e.key === "ArrowRight") nextBtn.click();
          if (e.key === "ArrowLeft") prevBtn.click();
          if (e.key === "Escape") lightbox.style.display = 'none';
        }
      });

      // Halkan ku dar code-kaagii hore ee 'showGroup' iyo 'buttons'
    })();
  </script>
